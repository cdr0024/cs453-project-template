openapi: 3.0.3

info:
  title: Task API
  version: 1.0.0
  description: Basic task tracking API for CS453 project


servers:
  - url: http://localhost:3000


paths:

  /tasks:

    get:
      summary: Get all tasks
      responses:

        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"



    post:
      summary: Create a task

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:

                title:
                  type: string
                  example: Create task API

                status:
                  type: string
                  example: todo


      responses:

        "201":
          description: Task created

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"


        "400":
          description: Missing title



components:

  schemas:

    Task:

      type: object

      properties:

        id:
          type: integer
          example: 1

        title:
          type: string
          example: Create task API

        status:
          type: string
          example: todo